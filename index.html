<!DOCTYPE html>
<html>
<head>
    <title>Special Message</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            color: #d62828;
            font-size: 40px;
            margin-bottom: 20px;
        }

        h2 {
            color: #222;
            font-size: 45px;
            display: none;
        }
    </style>
</head>

<body>

    <h1 id="message"></h1>
    <h2 id="reply">2008 deua nid te</h2>

    <script>
        const text = "Tau raag koiren na butum 🌚❤️";
        let i = 0;

        function typeWriter() {
            if (i < text.length) {
                document.getElementById("message").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 100);
            }
        }

        typeWriter();

        setTimeout(() => {
            document.getElementById("reply").style.display = "block";
        }, 4000);
    </script>

</body>
</html>
